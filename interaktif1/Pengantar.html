<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenali Sampah di Sekitar Kita</title>
	<link rel="apple-touch-icon" sizes="180x180" href="../terakhir/favicon_io/apple-touch-icon.png">
	<link rel="icon" type="image/png" sizes="32x32" href="../terakhir/favicon_io/favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="16x16" href="../terakhir/favicon_io/favicon-16x16.png">
	<style>
		.bg {
			max-width: 840px; /* Lebar maksimal halaman */
			margin: 0 auto;
			width: 100%;
			height: 472px;
			position: absolute;
			background-size: contain;
		}
		
		.klikbtn {
			position: absolute;
			width: 100px; 
			height: 40px; 
			background-color: none;
			cursor: pointer;
			touch-action: none;
			user-select: none;
			-webkit-user-select: none;
		}
	</style>
</head>
<body>
	<div class ="bg" id="bg">
		<div class="klikbtn" id="tombol"></div>
	</div>
	<script>
		const myBtn = document.getElementById("tombol");
		const myBG = document.getElementById("bg");
		myBG.style.backgroundImage = "url(img/pengantar.png)";
		let lebarJendela = window.innerWidth;
		let tinggiJendela = window.innerHeight;
		var scl = 1;
		myBG.x = window.scrollX+(lebarJendela-840*scl)/2;
		myBG.y = window.scrollY+(tinggiJendela-472*scl)/2;
		myBG.style.left = ''+(myBG.x)+'px';
		myBG.style.top = ''+(myBG.y)+'px';
		var xybtn = [710,412];
		myBtn.style.left = ''+(xybtn[0])+'px';
		myBtn.style.top = ''+(xybtn[1])+'px';
		myBtn.addEventListener("click", function() {
			location.href = "Pembukaan.html";
		});
		
		document.body.style.backgroundColor = "black";
		window.addEventListener('resize', () => {
			ZoomAll();
		});
	</script>
	<script>
		function UbahWindow(xc,yc){
			lebarJendela = window.innerWidth;
			tinggiJendela = window.innerHeight;
			myBG.x = window.scrollX+(lebarJendela-840*scl)/2;
			myBG.y = window.scrollY+(tinggiJendela-472*scl)/2;
			myBG.style.left = ''+(myBG.x)+'px';
			myBG.style.top = ''+(myBG.y)+'px';
			myBtn.style.left = ''+(xybtn[0])+'px';
			myBtn.style.top = ''+(xybtn[1])+'px';
		}
		function ZoomAll(){
			let lebarJendela = window.innerWidth;
			let tinggiJendela = window.innerHeight;
			var xscale = lebarJendela/840;
			var yscale = tinggiJendela/472;
			scl = 0.95*Math.min(xscale,yscale);
			fixzoom = scl*100;
			document.body.style.zoom = ""+fixzoom+"%";
			UbahWindow(0,0);
		}
		
		ZoomAll();
		function handleClick(event) {
			console.log("handleClick");
		}
		myBG.addEventListener('click', handleClick);
		setTimeout(() => {
			console.log("handleClick")
			ZoomAll();
			myBG.removeEventListener('click', handleClick);
		}, 50);
	</script>
	<script>
		var DataSaya = [0,0,0,0];
		var Asalah1 = 0;
		var Asalah2 = 0;
		var Asalah3 = 0;
		var Asalah4 = 0;
		localStorage.setItem("arData", DataSaya);
		localStorage.setItem("Asalah1", Asalah1);
		localStorage.setItem("Asalah2", Asalah2);
		localStorage.setItem("Asalah3", Asalah3);
		localStorage.setItem("Asalah4", Asalah4);
		var Bsalah = 10;
		localStorage.setItem("Bsalah", Bsalah);
		var CDataSaya = [0,0,0];
		localStorage.setItem("arCData", CDataSaya);
		var Ccoba1 = 0;
		var Ccoba2 = 0;
		localStorage.setItem("Ccoba1", Ccoba1);
		localStorage.setItem("Ccoba2", Ccoba2);
	</script>
</body>
</html>
