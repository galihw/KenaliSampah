<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenali Sampah di Sekitar Kita</title>
	<link rel="apple-touch-icon" sizes="180x180" href="../terakhir/favicon_io/apple-touch-icon.png">
	<link rel="icon" type="image/png" sizes="32x32" href="../terakhir/favicon_io/favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="16x16" href="../terakhir/favicon_io/favicon-16x16.png">
	<style>
		.bg {
			max-width: 840px; /* Lebar maksimal halaman */
			margin: 0 auto;
			width: 100%;
			height: 472px;
		}
		.klikbtn {
			position: absolute;
			cursor: pointer;
			touch-action: none;
			width: 180px; 
			height: 50px; 
			background-color: #220022;
			user-select: none;
			-webkit-user-select: none;
			
		}
	</style>
</head>
<body>
	<div class ="bg" id="bg"></div>
	<div class="klikbtn" id="tombol1"></div>
	<div class="klikbtn" id="tombol2"></div>
	<div class="klikbtn" id="tombol3"></div>
	<div class="klikbtn" id="tombol4"></div>
	<script>
		const cX = window.scrollX;
		const cY = window.scrollY;
		let DataSaya = localStorage.getItem("arData");
		let DataSini = DataSaya.split(",");
		console.log(DataSini)
		
		const myBG = document.getElementById("bg");
		myBG.style.backgroundImage = "url(img/buka.png)";
		
		
		var arbtn = [];
		var xybtn = [[127,185],[127+231,185],[127,185+133],[127+231,185+133]];
		var linkbtn = ["1taman.html","2sekolah.html","3bengkel.html","4rumah.html"]
		for(var i=1;i<=4;i++){
			arbtn[i-1] = document.getElementById('tombol'+i);
			arbtn[i-1].style.position =  "absolute";
			arbtn[i-1].style.left = ''+(myBG.getBoundingClientRect().x+xybtn[i-1][0])+'px';
			arbtn[i-1].style.top = ''+(myBG.getBoundingClientRect().y+xybtn[i-1][1])+'px';
			arbtn[i-1].style.zIndex = "auto";
			arbtn[i-1].style.opacity = "0";
			
			arbtn[i-1].link = linkbtn[i-1];
			arbtn[i-1].addEventListener("click", function(e) {
				location.href = e.target.link;
			});
		}
		
		var arrect = [];
		var xyrect = [[110,148],[110+231,148],[110,148+133],[110+231,148+133]]
		for(var i=1;i<=4;i++){
			arrect[i-1] = document.createElement('div');
			arrect[i-1].style.width = '215px';
			arrect[i-1].style.height = '120px';
			arrect[i-1].style.position =  "absolute";
			arrect[i-1].style.backgroundColor = 'grey';
			arrect[i-1].style.opacity = "0.7";
			arrect[i-1].style.zIndex = "auto";
			arrect[i-1].style.display = "none";
			arrect[i-1].style.left = ''+(myBG.getBoundingClientRect().x+xyrect[i-1][0])+'px';
			arrect[i-1].style.top = ''+(myBG.getBoundingClientRect().y+xyrect[i-1][1])+'px';
			myBG.appendChild(arrect[i-1]);
		}
		
		var ncek = 0;
		for(var i=1;i<=4;i++){
			if(DataSini[i-1]==1){
				arrect[i-1].style.display = "";
				document.getElementById("tombol"+i).style.display = "none"
				ncek++;
			}
			if(ncek==4){
				location.href = "Penutupan.html";
			}
		}
		
		
		
		window.addEventListener('resize', () => {
			UbahWindow(0,0)
		});
		
		window.addEventListener('scroll', () => {
			const cX = window.scrollX || window.pageXOffset;
			const cY = window.scrollY || window.pageYOffset;
			UbahWindow(cX,cY)
		});
		
		function UbahWindow(xc,yc){
			for(var i=1;i<=4;i++){
				arbtn[i-1].style.left = ''+(myBG.getBoundingClientRect().x+xybtn[i-1][0] + xc)+'px';
				arbtn[i-1].style.top = ''+(myBG.getBoundingClientRect().y+xybtn[i-1][1] + yc)+'px';
				arrect[i-1].style.left = ''+(myBG.getBoundingClientRect().x+xyrect[i-1][0] + xc)+'px';
				arrect[i-1].style.top = ''+(myBG.getBoundingClientRect().y+xyrect[i-1][1] + yc)+'px';
			}
		}
	</script>
	
	
	<script>
	</script>
</body>
</html>
