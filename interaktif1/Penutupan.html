<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenali Sampah di Sekitar Kita</title>
	<link rel="apple-touch-icon" sizes="180x180" href="../terakhir/favicon_io/apple-touch-icon.png">
	<link rel="icon" type="image/png" sizes="32x32" href="../terakhir/favicon_io/favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="16x16" href="../terakhir/favicon_io/favicon-16x16.png">
	<style>
		.bg {
			max-width: 840px; /* Lebar maksimal halaman */
			margin: 0 auto;
			width: 100%;
			height: 472px;
			position: absolute;
			background-size: contain;
		}
		.klikbtn {
			position: absolute;
			cursor: pointer;
			touch-action: none;
			width: 180px; 
			height: 50px; 
			background-color: #220022;
			user-select: none;
			-webkit-user-select: none;
			
		}
	</style>
</head>
<body>
	<div class ="bg" id="bg">
		<div class="klikbtn" id="lanjut" style="width: 100px; height: 40px;"></div>
	</div>
	<script>
		const myBG = document.getElementById("bg");
		myBG.style.backgroundImage = "url(img/lanjut.png)";
		var scl = 1;
		let lebarJendela = window.innerWidth;
		let tinggiJendela = window.innerHeight;
		myBG.x = window.scrollX+(lebarJendela-840*scl)/2;
		myBG.y = window.scrollY+(tinggiJendela-472*scl)/2;
		myBG.style.left = ''+(myBG.x)+'px';
		myBG.style.top = ''+(myBG.y)+'px';
		var xy = [285,285];
		document.getElementById("lanjut").addEventListener("click", function() {
			location.href = "../interaktif2/Pembukaan.html";
		});
		document.getElementById("lanjut").style.position =  "absolute";
		document.getElementById("lanjut").style.left = ''+(xy[0])+'px';
		document.getElementById("lanjut").style.top = ''+(xy[1])+'px';
		document.getElementById("lanjut").style.zIndex = ""+(200)+"";
		document.getElementById("lanjut").style.opacity = "0"; // mengatur hilang
		
		document.body.style.backgroundColor = "black";
		window.addEventListener('resize', () => {
			ZoomAll();
		});
	</script>
	<script>
		function UbahWindow(xc,yc){
			lebarJendela = window.innerWidth;
			tinggiJendela = window.innerHeight;
			myBG.x = window.scrollX+(lebarJendela-840*scl)/2;
			myBG.y = window.scrollY+(tinggiJendela-472*scl)/2;
			myBG.style.left = ''+(myBG.x)+'px';
			myBG.style.top = ''+(myBG.y)+'px';
			document.getElementById("lanjut").style.left = ''+(xy[0])+'px';
			document.getElementById("lanjut").style.top = ''+(xy[1])+'px';
		}
		function ZoomAll(){
			let lebarJendela = window.innerWidth;
			let tinggiJendela = window.innerHeight;
			var xscale = lebarJendela/840;
			var yscale = tinggiJendela/472;
			scl = 0.95*Math.min(xscale,yscale);
			fixzoom = scl*100;
			document.body.style.zoom = ""+fixzoom+"%";
			UbahWindow(0,0);
		}
		
		ZoomAll();
		function handleClick(event) {
			console.log("handleClick");
		}
		myBG.addEventListener('click', handleClick);
		setTimeout(() => {
			console.log("handleClick")
			ZoomAll();
			myBG.removeEventListener('click', handleClick);
		}, 50);
	</script>
	
	
	<script>
	</script>
</body>
</html>
