<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenali Sampah di Sekitar Kita</title>
	<link rel="apple-touch-icon" sizes="180x180" href="../terakhir/favicon_io/apple-touch-icon.png">
	<link rel="icon" type="image/png" sizes="32x32" href="../terakhir/favicon_io/favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="16x16" href="../terakhir/favicon_io/favicon-16x16.png">
	<style>
		.bg {
			max-width: 840px; /* Lebar maksimal halaman */
			margin: 0 auto;
			width: 100%;
			height: 472px;
		}
		.klikbtn {
			position: absolute;
			cursor: pointer;
			touch-action: none;
			width: 180px; 
			height: 50px; 
			background-color: #220022;
			user-select: none;
			-webkit-user-select: none;
			
		}
	</style>
</head>
<body>
	<div class ="bg" id="buka"></div>
	<div class="klikbtn" id="lanjut" style="width: 100px; height: 40px;"></div>
	<script>
		const cX = window.scrollX;
		const cY = window.scrollY;
		const myBG = document.getElementById("buka");
		myBG.style.backgroundImage = "url(img/lanjut.png)";
		var xy = [285,285];
		document.getElementById("lanjut").addEventListener("click", function() {
			location.href = "../interaktif2/Pembukaan.html";
		});
		document.getElementById("lanjut").style.position =  "absolute";
		document.getElementById("lanjut").style.left = ''+(myBG.getBoundingClientRect().x+xy[0])+'px';
		document.getElementById("lanjut").style.top = ''+(myBG.getBoundingClientRect().y+xy[1])+'px';
		document.getElementById("lanjut").style.zIndex = ""+(200)+"";
		document.getElementById("lanjut").style.opacity = "0"; // mengatur hilang
		
		window.addEventListener('resize', () => {
			UbahWindow(0,0)
		});
		
		window.addEventListener('scroll', () => {
			const cX = window.scrollX || window.pageXOffset;
			const cY = window.scrollY || window.pageYOffset;
			UbahWindow(cX,cY)
		});
		
		function UbahWindow(xc,yc){
			document.getElementById("lanjut").style.left = ''+(myBG.getBoundingClientRect().x+xy[0] + xc)+'px';
			document.getElementById("lanjut").style.top = ''+(myBG.getBoundingClientRect().y+xy[1] + yc)+'px';
		}
	</script>
	
	
	<script>
	</script>
</body>
</html>
