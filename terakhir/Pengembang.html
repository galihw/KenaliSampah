<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenali Sampah di Sekitar Kita</title>
	<link rel="apple-touch-icon" sizes="180x180" href="../terakhir/favicon_io/apple-touch-icon.png">
	<link rel="icon" type="image/png" sizes="32x32" href="../terakhir/favicon_io/favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="16x16" href="../terakhir/favicon_io/favicon-16x16.png">
	<style>
		.bg {
			max-width: 840px; /* Lebar maksimal halaman */
			margin: 0 auto;
			width: 100%;
			height: 472px;
			position: absolute;
		}
		.klikbtn {
			position: absolute;
			width: 100px; 
			height: 40px; 
			background-color: none;
			cursor: pointer;
			touch-action: none;
			user-select: none;
			-webkit-user-select: none;
		}
		.klikgithub {
			position: absolute;
			width: 230px; 
			height: 25px; 
			background-color: none;
			cursor: pointer;
			touch-action: none;
			user-select: none;
			-webkit-user-select: none;
		}
	</style>
</head>
<body>
	<div class ="bg" id="bg">
		<div class="klikbtn" id="tombol"></div>
		<div class="klikbtn" id="aset"></div>
		<div class="klikgithub" id="github"></div>
	</div>
	<script>
		const myBtn = document.getElementById("tombol");
		const myAset = document.getElementById("aset");
		const myGithub = document.getElementById("github");
		const myBG = document.getElementById("bg");
		var scl = 1;
		let lebarJendela = window.innerWidth;
		let tinggiJendela = window.innerHeight;
		myBG.x = window.scrollX+(lebarJendela-840*scl)/2;
		myBG.y = window.scrollY+(tinggiJendela-472*scl)/2;
		myBG.style.left = ''+(myBG.x)+'px';
		myBG.style.top = ''+(myBG.y)+'px';
		myBG.style.backgroundImage = "url(img/pengembang.png)";
		myBtn.style.left = ''+(685)+'px';
		myBtn.style.top = ''+(394)+'px';
		myAset.style.left = ''+(685)+'px';
		myAset.style.top = ''+(121)+'px';
		myGithub.style.left = ''+(210)+'px';
		myGithub.style.top = ''+(155)+'px';
		myBtn.addEventListener("click", function() {
			location.href = "../beranda/beranda.html";
		});
		myAset.addEventListener("click", function() {
			location.href = "LinkGambar.html";
		});
		myGithub.addEventListener("click", function() {
			location.href = "https://galihw.github.io/GalihWidosamodra/index.html";
		});
		
	</script>
	<script>
		var fixscale = 1;
		var fixzoom
		document.body.style.backgroundColor = "black";
		window.addEventListener('resize', () => {
			ZoomAll();
		});

		function UbahWindow(xc,yc){
			lebarJendela = window.innerWidth;
			tinggiJendela = window.innerHeight;
			myBG.x = window.scrollX+(lebarJendela-840*scl)/2;
			myBG.y = window.scrollY+(tinggiJendela-472*scl)/2;
			myBG.style.left = ''+(myBG.x)+'px';
			myBG.style.top = ''+(myBG.y)+'px';
			myBtn.style.left = ''+(685)+'px';
			myBtn.style.top = ''+(392)+'px';
			myAset.style.left = ''+(685)+'px';
			myAset.style.top = ''+(121)+'px';
			myGithub.style.left = ''+(210)+'px';
			myGithub.style.top = ''+(155)+'px';
		}
		function ZoomAll(){
			let lebarJendela = window.innerWidth;
			let tinggiJendela = window.innerHeight;
			var xscale = lebarJendela/840;
			var yscale = tinggiJendela/472;
			scl = 0.95*Math.min(xscale,yscale);
			fixscale = scl;
			fixzoom = scl*100;
			document.body.style.zoom = ""+fixzoom+"%";
			UbahWindow(0,0);
		}
		
		ZoomAll();
		function handleClick(event) {
			console.log("handleClick");
		}
		myBG.addEventListener('click', handleClick);
		setTimeout(() => {
			console.log("handleClick")
			ZoomAll();
			myBG.removeEventListener('click', handleClick);
		}, 100);
		
		// Membaca ukuran pertama kali saat halaman dibuka
		//window.dispatchEvent(new Event("resize"));	
	</script>
</body>
</html>
