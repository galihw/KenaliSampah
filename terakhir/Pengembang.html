<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenali Sampah di Sekitar Kita</title>
	<link rel="apple-touch-icon" sizes="180x180" href="../terakhir/favicon_io/apple-touch-icon.png">
	<link rel="icon" type="image/png" sizes="32x32" href="../terakhir/favicon_io/favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="16x16" href="../terakhir/favicon_io/favicon-16x16.png">
	<style>
		.bg {
			max-width: 840px; /* Lebar maksimal halaman */
			margin: 0 auto;
			width: 100%;
			height: 472px;
		}
		.klikbtn {
			position: absolute;
			width: 100px; 
			height: 40px; 
			background-color: none;
			cursor: pointer;
			touch-action: none;
			user-select: none;
			-webkit-user-select: none;
		}
		.klikgithub {
			position: absolute;
			width: 230px; 
			height: 25px; 
			background-color: none;
			cursor: pointer;
			touch-action: none;
			user-select: none;
			-webkit-user-select: none;
		}
	</style>
</head>
<body>
	<div class ="bg" id="bg"></div>
	<div class="klikbtn" id="tombol"></div>
	<div class="klikbtn" id="aset"></div>
	<div class="klikgithub" id="github"></div>
	<script>
		const myBtn = document.getElementById("tombol");
		const myAset = document.getElementById("aset");
		const myGithub = document.getElementById("github");
		const myBG = document.getElementById("bg");
		myBG.style.backgroundImage = "url(img/pengembang.png)";
		myBtn.style.left = ''+(myBG.getBoundingClientRect().x+685)+'px';
		myBtn.style.top = ''+(myBG.getBoundingClientRect().y+394)+'px';
		myAset.style.left = ''+(myBG.getBoundingClientRect().x+685)+'px';
		myAset.style.top = ''+(myBG.getBoundingClientRect().y+121)+'px';
		myGithub.style.left = ''+(myBG.getBoundingClientRect().x+210)+'px';
		myGithub.style.top = ''+(myBG.getBoundingClientRect().y+155)+'px';
		myBtn.addEventListener("click", function() {
			location.href = "../beranda/beranda.html";
		});
		myAset.addEventListener("click", function() {
			location.href = "LinkGambar.html";
		});
		myGithub.addEventListener("click", function() {
			location.href = "https://galihw.github.io/GalihWidosamodra/index.html";
		});
		
		
		window.addEventListener('resize', () => {
			myBtn.style.left = ''+(myBG.getBoundingClientRect().x+685)+'px';
			myBtn.style.top = ''+(myBG.getBoundingClientRect().y+392)+'px';
			myAset.style.left = ''+(myBG.getBoundingClientRect().x+685)+'px';
			myAset.style.top = ''+(myBG.getBoundingClientRect().y+121)+'px';
			myGithub.style.left = ''+(myBG.getBoundingClientRect().x+210)+'px';
			myGithub.style.top = ''+(myBG.getBoundingClientRect().y+155)+'px';
		});
	</script>
	<script>
	</script>
	
	
	<script>
	</script>
</body>
</html>
