	<script>
		var selectedEl = null;
		const controller = new AbortController();
		const { signal } = controller;

        function selectElement(el) {
            UnselectElement(el)
            selectedEl = el;
            //selectedEl.classList.add('terseleksi');
        }
        function UnselectElement(el) {
            if (selectedEl) {
                //selectedEl.classList.remove('terseleksi');
                //selectedEl.classList.remove('dropbenar');
				selectedEl = null;
            }
			atas.style.display = "none";
        }
		function setupDraggable(el,mc,mcdrop) {
			//var xmax = (mc.offsetWidth-el.offsetWidth);
			//var ymax = (mc.offsetHeight-el.offsetHeight);
			var xmax = (myBG.w-el.w);
			var ymax = (myBG.h-el.h);
			var xmin = 0;
			var ymin = 0;
			let startX=0, startY=0, initialX=0, initialY=0;
			let newX=0, newY=0;
			el.addEventListener('mousedown', dragMouseDown,{ signal });
			el.addEventListener('touchstart', dragMouseDown,{ signal }, { passive: false });
			
			
			el.ff = false;
            function dragMouseDown(e) {
                e.preventDefault();
                selectElement(el);
				if(e.type==="touchstart"){
					startX = e.touches[0].clientX;
					startY = e.touches[0].clientY;
					initialX = el.offsetLeft;
					initialY = el.offsetTop;
					document.addEventListener('touchend', dragMouseUp);
					document.addEventListener('touchmove', dragMouseMove, { passive: false });
				}else{
					startX = e.clientX;
					startY = e.clientY;
					initialX = el.offsetLeft;
					initialY = el.offsetTop;
					document.addEventListener('mouseup', dragMouseUp);
					document.addEventListener('mousemove', dragMouseMove);
				}
				dragText.innerHTML = "Nama Benda = "+el.name;
				el.inbox = 0;
            }

            function dragMouseMove(e) {
                e.preventDefault();
				let deltaX=0;
				let deltaY=0;
				if(e.type==="touchmove"){
					deltaX = (e.touches[0].clientX - startX) / scl;
					deltaY = (e.touches[0].clientY - startY) / scl;
				}else{
					deltaX = (e.clientX - startX) / scl;
					deltaY = (e.clientY - startY) / scl;
				}
				newX = initialX + deltaX;
				newY = initialY + deltaY;
				newX = Math.max(xmin,Math.min(xmax,newX));
				newY = Math.max(ymin,Math.min(ymax,newY));
				el.style.left = newX + "px";
				el.style.top = newY + "px";
				atas.style.display = "";
				atas.src = el.src;
				atas.style.left = newX + "px";
				atas.style.top = newY + "px";
				el.ff = newX >= mcdrop.x-el.w/2 &&	newX <= mcdrop.x+mcdrop.w-el.w/2 && newY >= mcdrop.y-el.h/2 && newY <= mcdrop.y+mcdrop.h-el.h/2;
				if(el.ff){
					//el.classList.remove('terseleksi');
					//el.classList.add('dropbenar');
				}else{
					//el.classList.add('terseleksi');
					//el.classList.remove('dropbenar');
				}
            }
			
            function dragMouseUp() {
                document.removeEventListener('mouseup', dragMouseUp);
                document.removeEventListener('mousemove', dragMouseMove);
                document.removeEventListener('touchend', dragMouseUp);
                document.removeEventListener('touchmove', dragMouseMove);
				CekDrop();
            }
			function CekDrop() {
				dragText.innerHTML = "Nama Benda = ,,,";
				if(el.ff && selectedEl){
					//console.log("benar");
					var ifix = Math.ceil(newX/280);
					//console.log("ifix =  "+ifix
					el.inbox = ifix;
					DaftarIsiImg();
				}else{
					//console.log("salah");
					el.ff = false;
					el.style.left = el.x0+'px';
					el.style.top = el.y0+'px';
					el.xx = el.x0;
					el.yy = el.y0;
					UnselectElement(el);
				}
				//XYbenda();
				UnselectElement(el);
			}
        }
	</script>

	<script>
		function RandomMyArray(Arr){
			for (var i=0; i<Arr.length; i++){
				var r = Math.floor(Math.random() * Arr.length);
				var a = Arr[i];
				Arr[i] = Arr[r];
				Arr[r] = a;
			}
			return Arr;
		}
		function arraysAreEqual(arr1, arr2) {
			if (arr1.length !== arr2.length) {
			   return false;
			}
			return arr1.every((val, index) => val === arr2[index]);
		}

		function ZoomAll(){
			let lebarJendela = window.innerWidth;
			let tinggiJendela = window.innerHeight;
			var xscale = lebarJendela/840;
			var yscale = tinggiJendela/472;
			scl = 0.95*Math.min(xscale,yscale);
			fixscale = scl;
			fixzoom = scl*100;
			document.body.style.zoom = ""+fixzoom+"%";
			XYbenda();
		}
		
		ZoomAll();
