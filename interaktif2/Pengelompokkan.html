<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

	<style>
		.box {
			width: 280px;
			height: 160px;
			display: inline-block;
			margin: 0px;
			vertical-align: top;
		}	
		.layar {
			max-width: 842px; /* Lebar maksimal halaman */
			margin: 0 auto;   /* Otomatis rata tengah kiri-kanan */
			width: 100%; 	  /* width: 842px; */
			height: 195px;
		}
		.inlayar {
			max-width: 800px; /* Lebar maksimal halaman */
			margin: 0 auto;   /* Otomatis rata tengah kiri-kanan */
			height: 195px;
		}
		.judul {
			max-width: 842px; /* Lebar maksimal halaman */
			margin: 0 auto;   /* Otomatis rata tengah kiri-kanan */
			width: 100%;
			height: 60px;
		}
		.namabenda {
			max-width: 842px; /* Lebar maksimal halaman */
			margin: 0 auto;   /* Otomatis rata tengah kiri-kanan */

			height: 40px;
		}
		.draggable {
			/*width: 100px;*/
			/*height: 100px;*/
			/*background-color: #3498db;*/
			position: absolute;
			cursor: grab;

			/* Critical for touchscreen functionality */
			touch-action: none; 
			user-select: none;
			-webkit-user-select: none;
		}
		.dragatas {
			position: absolute; /* atau relative/fixed */
			z-index: 9999;
		}
		.bg {
			width: 842px;
			height: 472px;
			position: absolute; /* atau relative/fixed */

		img {
			-webkit-user-drag: none; /* Safari */
			user-drag: none;
			-webkit-user-select: none; /* Safari */
			-moz-user-select: none; /* Firefox */
			-ms-user-select: none; /* Internet Explorer/Edge */
			user-select: none;
		}
		.klikbtn {
			position: absolute;
			cursor: pointer;
			touch-action: none;
			user-select: none;
			-webkit-user-select: none;
		}
	</style>
</head>
<body>
	<div class="bg" id="bg"></div>
	<div class="judul" id="judul"></div>
	<div class="layar" id="layar">
		<img id="drag1" class="draggable" >
		<img id="drag2" class="draggable" >
		<img id="drag3" class="draggable" >

		<img id="drag12" class="draggable" >
		<img id="drag13" class="draggable" >

		<div class="box" id="box2"></div>

	</div>

	<div class="klikbtn" id="lanjut" style="width: 101px; height: 41px;">
		<img src="img/btnlanjut.png" alt="btnlanjut">
	</div>
	
	<script>
		document.getElementById("lanjut").style.display = "none";
		var nama = [
					"SISA SAYURAN",
					"KULIT BUAH",
					"KAYU",
					"KERTAS",
					"DAUN",
					"RANTING",
					
					"BOTOL PLASTIK",
					"KALENG",
					"TAS PLASTIK",
					"BUNGKUS SNACK",
					
					"LAMPU BEKAS",
					"AKI",
					"BATERAI"
					];
		var namatrue = [];
		namatrue[0] = [
					"SISA SAYURAN",
					"KULIT BUAH",
					"KAYU",
					"KERTAS",
					"DAUN",
					"RANTING"
					  ];
		namatrue[1] = [
					"BOTOL PLASTIK",
					"KALENG",
					"TAS PLASTIK",
					"BUNGKUS SNACK"
					  ];
		namatrue[2] = [
					"LAMPU BEKAS",
					"AKI",
					"BATERAI"
					  ];
		namatrue[0].sort();
		namatrue[1].sort();
		namatrue[2].sort();
	</script>
	<script>
	
		//var item = null
		var item = document.querySelector('.draggable');
		const itemAtas = document.getElementById('atas');
		itemAtas.style.visibility = "hidden";
		function startDrag(e) {
			// Prevent mobile screen scrolling while dragging
			const targetElement = e.target || e.srcElement;
			item = targetElement;
			if (e.type === 'touchstart') {
				e.preventDefault(); 
				const touch = e.targetTouches[0];
				offsetX = touch.clientX - item.getBoundingClientRect().left;
				offsetY = touch.clientY - item.getBoundingClientRect().top;;
			} else {
				offsetX = e.clientX - item.getBoundingClientRect().left;
				offsetY = e.clientY - item.getBoundingClientRect().top;
			}
			item.style.cursor = 'grabbing';
			item.dataset.dragging = 'true';
			
			itemAtas.src = item.src;
			itemAtas.style.visibility = "hidden";
			itemAtas.style.cursor = 'grabbing';
			itemAtas.dataset.dragging = 'true';
			dragText.innerHTML = "Nama Benda = "+item.name;

		}
	</script>
	
	
	<script>
		function RandomMyArray(Arr){
			for (var i=0; i<Arr.length; i++){
				var r = Math.floor(Math.random() * Arr.length);
				var a = Arr[i];
				Arr[i] = Arr[r];
				Arr[r] = a;
			}
			return Arr;
		}
		function arraysAreEqual(arr1, arr2) {
			if (arr1.length !== arr2.length) {
			   return false;
			}
			return arr1.every((val, index) => val === arr2[index]);
		}
		function centerTextDiv(nameDiv){
			nameDiv.style.display = "flex";
			nameDiv.style.justifyContent = "center"; // Centers horizontally
			nameDiv.style.alignItems = "center";     // Centers vertically
		}
		
	
		const dragText = document.getElementById('drag-text');
		const judul = document.getElementById('judul');
		const layar = document.getElementById('layar');
		const myBG = document.getElementById('bg');
				
		myBG.style.left = ''+(3+judul.getBoundingClientRect().x)+'px';
		myBG.style.top = ''+(0+judul.getBoundingClientRect().y)+'px';
		myBG.style.backgroundImage = "url(img/desainbg.png)";
		dragText.innerHTML = "Nama Benda : ...";
		dragText.style.fontFamily = "'Arial Rounded MT Bold', sans-serif";
		dragText.style.fontSize = "24px";
		dragText.style.userSelect = "none";
		judul.style.fontSize = "24px";
		centerTextDiv(dragText);
		centerTextDiv(judul);
		
		window.resizeTo(840, 472);
		
		var ntot = 16*3;//64;
		var ARmybox = [];
		var ARno = []
		var inlayar = document.createElement('div');
		inlayar.classList.add("inlayar");
		layar.appendChild(inlayar);
		for (var i=1;i<=ntot;i++){
			var myBox = document.createElement('div');
			myBox.style.width = "50px";
			myBox.style.height = "50px";
			myBox.style.display = "inline-block";
			myBox.style.margin = "0px";
			//myBox.style.backgroundColor = "rgb("+(255-i)+", 255, 255)";
			inlayar.appendChild(myBox);
			ARmybox.push(myBox);
			ARno[i-1]=i-1;
		}
		ARno = RandomMyArray(ARno);
		
		var nn = 13;
		var ARimg = [];
		var ARbox = [];
		var ARboximg = [];
		for (var i=1;i<=nn;i++){
			ARimg.push(document.getElementById('drag'+i));
		}
		for (var i=1;i<=nn;i++){
			ARimg[i-1].src = "img/kecil"+i+".png";
			ARimg[i-1].style.position = 'fixed';
			ARimg[i-1].style.zIndex = ""+(200+i)+"";
			
			//ARmybox[i-1].appendChild(ARimg[i-1]);
			ARmybox[ARno[i-1]].appendChild(ARimg[i-1]);
		}
		
		var warnaBG = ["#00ff00","#00c1c1","#f2aa1d"]
		var arteks = ["sampah 1","sampah 2","sampah 3"]
		for (var i=1;i<=3;i++){
			ARbox.push(document.getElementById('ibox'+i))
			ARboximg.push(document.getElementById('box'+i))
		}
		
		
		
		window.getSelection().removeAllRanges();
		window.addEventListener('resize', () => {
			var x0 = layar.getBoundingClientRect().left+2;
			var y0 = dragText.getBoundingClientRect().top+dragText.offsetHeight;
			myBG.style.left = ''+x0+'px';
			for (var i=1;i<=3;i++){
				ARboximg[i-1].style.left = ''+(x0+280*(i-1))+'px';
				ARbox[i-1].style.left = ''+(x0+280*(i-1))+'px';
				ARboximg[i-1].style.top = ''+(y0+20)+'px';
				ARbox[i-1].style.top = ''+(y0+20)+'px';
			}
			document.getElementById("lanjut").style.left = ''+(x0+650)+'px';
			document.getElementById("lanjut").style.top = ''+(y0-34)+'px';
		});

		var x0 = layar.getBoundingClientRect().left+2;;
		var y0 = dragText.getBoundingClientRect().top+dragText.offsetHeight;
		myBG.style.left = ''+x0+'px';
		
		for (var i=1;i<=3;i++){
			ARboximg[i-1].style.position = 'fixed';
			ARboximg[i-1].style.zIndex = ""+(100+i)+"";
			ARboximg[i-1].style.top = ''+312+'px';
			ARboximg[i-1].style.left = ''+(x0+280*(i-1))+'px';
			ARboximg[i-1].style.top = ''+(y0+20)+'px';
			
			//ARbox[i-1].src = "img/imgbox"+i+".png";
			ARbox[i-1].style.position = 'fixed';
			ARbox[i-1].style.zIndex = ""+(10+i)+"";
			ARbox[i-1].style.top = ''+312+'px';
			ARbox[i-1].style.left = ''+(x0+280*(i-1))+'px';
			ARbox[i-1].style.top = ''+(y0+20)+'px';
			
			layar.appendChild(ARboximg[i-1]);
			layar.appendChild(ARbox[i-1]);
		}
		for (var i=1;i<=nn;i++){
			ARimg[i-1].name=nama[i-1];
			ARimg[i-1].addEventListener('mousedown', startDrag);
			ARimg[i-1].addEventListener('touchstart', startDrag, { passive: false });
			
			const rect = ARimg[i-1].getBoundingClientRect();
			ARimg[i-1].xAwal = ARimg[i-1].getBoundingClientRect().left;
			ARimg[i-1].yAwal = ARimg[i-1].getBoundingClientRect().top;
			//console.log("Posisi X awal dari gambar:", ARimg[i-1].xAwal, ARimg[i-1].yAwal);
		}
		
		
		
	</script>
	<script>
		//const item = document.querySelector('.draggable');

		let offsetX = 0;
		let offsetY = 0;

		// -- MOUSE EVENTS (Desktop) --
		//item.addEventListener('mousedown', startDrag);
		document.addEventListener('mousemove', moveDrag);
		document.addEventListener('mouseup', stopDrag);

		// -- TOUCH EVENTS (Mobile/Tablet) --
		//item.addEventListener('touchstart', startDrag, { passive: false });
		document.addEventListener('touchmove', moveDrag, { passive: false });
		document.addEventListener('touchend', stopDrag);


		function moveDrag(e) {
			if (item.dataset.dragging !== 'true') return;
			e.preventDefault();

			let currentX, currentY;

			if (e.type === 'touchmove') {
				const touch = e.targetTouches[0];
				currentX = touch.clientX;
				currentY = touch.clientY;
			} else {
				currentX = e.clientX;
				currentY = e.clientY;
				
			}
			dragText.innerHTML = "Nama Benda = "+item.name;
			
			// Update element position
			item.style.position = 'fixed';
			item.style.left = `${currentX - offsetX}px`;
			item.style.top = `${currentY - offsetY}px`;
			itemAtas.style.left = `${currentX - offsetX}px`;
			itemAtas.style.top = `${currentY - offsetY}px`;
			itemAtas.style.visibility = "visible";

		}

		function stopDrag(e) {
			if (item.dataset.dragging !== 'true') return;
			item.dataset.dragging = 'false';

			let releaseX, releaseY;

			if (e.type === 'touchend') {
				// touchend changedTouches contains the touch point that was lifted
				const touch = e.changedTouches[0];
				releaseX = touch.clientX;
				releaseY = touch.clientY;
			} else {
				releaseX = e.clientX;
				releaseY = e.clientY;
			}

			// Hide the item briefly to see what is underneath it
			item.style.display = 'none';
			item.style.display = 'block';
			var dT
			for(var i=1;i<=3;i++){
				var x0 = ARboximg[i-1].getBoundingClientRect().x;
				var ww = ARboximg[i-1].offsetWidth;
				var x1 = x0+ww;
				var y0 = ARboximg[i-1].getBoundingClientRect().y;
				var hh = ARboximg[i-1].offsetHeight;
				var y1 = y0+hh;
				var ff1 = releaseX>x0 && releaseX<x1;
				var ff2 = releaseY>y0 && releaseY<y1;
				var fff = ff1 && ff2;
				if(fff){
					dT = ARboximg[i-1];
				}
			}
			dragText.innerHTML = "Nama Benda = ...";
			
			// Check if target is your valid drop container
			if (dT) {
				//dropTarget.appendChild(item);
				dT.appendChild(item);
				item.style.position = 'static';
				item.style.left = '0px';
				item.style.top = '0px';
				item.style.float = "left";
				
				DaftarIsiImg();
			}else{
				item.style.left = ''+item.xAwal+'px';
				item.style.top = ''+item.yAwal+'px';
				item.style.position = 'fixed';
				//item.style.zIndex = item.zold;
				layar.appendChild(item);
			}
			itemAtas.style.visibility = "hidden";
		}
		function DaftarIsiImg(){
			var ff = true;
			var isinama = [[],[],[]];
			var ctisi = 0;
			for(j=0;j<3;j++){
				const anakElemen = ARboximg[j].children;
				for (let i = 0; i < anakElemen.length; i++) {
					if (anakElemen[i].tagName.toLowerCase() === 'img') {
						isinama[j].push(anakElemen[i].name);
						ctisi++;
					}
				}
				isinama[j].sort();
				ff = ff && arraysAreEqual(namatrue[j], isinama[j]);
			}
			if(ff){
				// semua benar
				// jika sudah selesai semua
				dragText.innerHTML = "Good Job! \u{1F44D}";
				for (var i=1;i<=nn;i++){
					//ARimg[i-1].setAttribute('draggable', 'false');
					ARimg[i-1].removeEventListener('mousedown', startDrag);
					ARimg[i-1].removeEventListener('touchstart', startDrag, { passive: false });
				}
				localStorage.setItem("Bsalah", Bsalah);
				document.getElementById("lanjut").style.display = "";
			}else{
				if(!memulai){
					memulai=true
					Bsalah = 0;
				}
				if(ctisi==13){
					dragText.innerHTML = "Ups ... Ada yang belum tepat!";
					Bsalah++;
				}
				
			}
		}
		
	</script>
	<script>
		var Bsalah = 10;
		localStorage.setItem("Bsalah", Bsalah);
		var memulai = false;
		
		document.getElementById("lanjut").style.display = "none";
		document.getElementById("lanjut").addEventListener("click", function() {
			location.href = "../interaktif3/Pembukaan.html";
		});
		
		document.getElementById("lanjut").style.left = ''+(x0+650)+'px';
		document.getElementById("lanjut").style.top = ''+(y0-34)+'px';
	</script>
</body>
