<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenali Sampah di Sekitar Kita</title>
	<link rel="apple-touch-icon" sizes="180x180" href="../terakhir/favicon_io/apple-touch-icon.png">
	<link rel="icon" type="image/png" sizes="32x32" href="../terakhir/favicon_io/favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="16x16" href="../terakhir/favicon_io/favicon-16x16.png">
	<style>
		.bg {
			max-width: 840px; /* Lebar maksimal halaman */
			margin: 0 auto;
			width: 100%;
			height: 472px;
			position: absolute;
		}
		.klikbtn {
			position: absolute;
			cursor: pointer;
			touch-action: none;
			width: 260px;
			height: 50px; 
			background-color: #220022;
			user-select: none;
			-webkit-user-select: none;
		}
		.insert {
			position: absolute;
			touch-action: none;
			width: 261px; 
			height: 53px; 
			/*background-color: #220022;*/
			user-select: none;
			-webkit-user-select: none;
		}
		.kliknext {
			position: absolute;
			cursor: pointer;
			touch-action: none;
			width: 100px; 
			height: 40px; 
			/*background-color: #220022;*/
			user-select: none;
			-webkit-user-select: none;
			
		}
	</style>
</head>
<body>
	<div class ="bg" id="bg">
		<div class="klikbtn" id="tombol1"></div>
		<div class="klikbtn" id="tombol2"></div>
		<div class="klikbtn" id="tombol3"></div>
		<img class="insert" id="img1" src="img/hitamtutup.png"></img>
		<img class="insert" id="img2" src="img/hitamtutup.png"></img>
		<img class="insert" id="img3" src="img/hitamtutup.png"></img>
		<img class="kliknext" id="lanjut" src="img/btnlanjut.png"></img>
	</div>
	<script>
		let DataSaya3 = localStorage.getItem("arCData");
		let DataSini3 = DataSaya3.split(",");
		console.log("DataSini3 = "+DataSini3)
		
		const myBG = document.getElementById("bg");
		var scl = 1;
		let lebarJendela = window.innerWidth;
		let tinggiJendela = window.innerHeight;
		myBG.x = window.scrollX+(lebarJendela-840*scl)/2;
		myBG.y = window.scrollY+(tinggiJendela-472*scl)/2;
		myBG.style.left = ''+(myBG.x)+'px';
		myBG.style.top = ''+(myBG.y)+'px';
		myBG.style.backgroundImage = "url(img/buka.png)";
		var xy = [679,385];
		var arbtn = [];
		var xybtn = [[357,180],[357,180+82],[357,180+2*82]];
		var linkbtn = ["1organik.html","2anorganik.html","3lainnya.html"];
		for(var i=1;i<=3;i++){
			arbtn[i-1] = document.getElementById('tombol'+i);
			arbtn[i-1].style.left = ''+(xybtn[i-1][0])+'px';
			arbtn[i-1].style.top = ''+(xybtn[i-1][1])+'px';
			arbtn[i-1].style.opacity = "0";
			
			document.getElementById('img'+i).style.left = ''+(xybtn[i-1][0])+'px';
			document.getElementById('img'+i).style.top = ''+(xybtn[i-1][1])+'px';
			document.getElementById('img'+i).style.display = "none";
			
			arbtn[i-1].link = linkbtn[i-1];
			arbtn[i-1].addEventListener("click", function(e) {
				location.href = e.target.link;
			});
		}
		document.getElementById("lanjut").style.left = ''+(xy[0])+'px';
		document.getElementById("lanjut").style.top = ''+(xy[1])+'px';
		document.getElementById("lanjut").style.display = "none";
		
		var ncek = 0;
		for(var i=1;i<=3;i++){
			if(DataSini3[i-1]==1){
				document.getElementById('img'+i).style.display = "";
				document.getElementById("tombol"+i).style.display = "none"
				ncek++;
			}
			if(ncek==3){
				//location.href = "Penutupan.html";
				document.getElementById("lanjut").style.display = "";//none]
				document.getElementById("lanjut").addEventListener("click", function() {
					location.href = "Review.html";
				});
			}
		}
	</script>
	<script>
		var fixscale = 1;
		var fixzoom
		document.body.style.backgroundColor = "black";
		window.addEventListener('resize', () => {
			ZoomAll();
		});

		function UbahWindow(xc,yc){
			lebarJendela = window.innerWidth;
			tinggiJendela = window.innerHeight;
			myBG.x = window.scrollX+(lebarJendela-840*scl)/2;
			myBG.y = window.scrollY+(tinggiJendela-472*scl)/2;
			myBG.style.left = ''+(myBG.x)+'px';
			myBG.style.top = ''+(myBG.y)+'px';
			for(var i=1;i<=3;i++){
				arbtn[i-1] = document.getElementById('tombol'+i);
				arbtn[i-1].style.left = ''+(xybtn[i-1][0])+'px';
				arbtn[i-1].style.top = ''+(xybtn[i-1][1])+'px';
				
				document.getElementById('img'+i).style.left = ''+(xybtn[i-1][0])+'px';
				document.getElementById('img'+i).style.top = ''+(xybtn[i-1][1])+'px';
			}
			document.getElementById("lanjut").style.left = ''+(xy[0])+'px';
			document.getElementById("lanjut").style.top = ''+(xy[1])+'px';
		}
		function ZoomAll(){
			let lebarJendela = window.innerWidth;
			let tinggiJendela = window.innerHeight;
			var xscale = lebarJendela/840;
			var yscale = tinggiJendela/472;
			scl = 0.95*Math.min(xscale,yscale);
			fixzoom = scl*100;
			document.body.style.zoom = ""+fixzoom+"%";
			//myBG.style.clipPath = "polygon(0 0, "+fixzoom+"% 0, "+fixzoom+"% "+fixzoom+"%, 0 "+fixzoom+"%)";
			UbahWindow(0,0);
		}
		
		ZoomAll();
		//window.resizeTo(840, 472);
		
		function handleClick(event) {
			console.log("handleClick");
		}
		myBG.addEventListener('click', handleClick);
		setTimeout(() => {
			console.log("handleClick")
			ZoomAll();
			myBG.removeEventListener('click', handleClick);
		}, 50);
	</script>
	
	<script>
	</script>
</body>
</html>
