<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

	<style>
		.bg {

		}
		.areaDrop {

			user-select: none;
			-webkit-user-select: none;
		}
		.areaIn{
			position: absolute;
			left: 251px;
			top: 149px;

			user-select: none;
			-webkit-user-select: none;

		.areaImage{
			position: absolute;
			left: 251px;

		.center-text {

			position: absolute;

		.bubble {
			position: absolute; /* atau relative/fixed */
		}
		.dragatas {
			position: absolute; /* atau relative/fixed */
			z-index: 9999;
		}
		.namabenda {
			text-align: center;
			display: flex;
			justify-content: center;
			align-items: center;
			/*background-color: lightblue;*/

			height: 33px;
			position: absolute;
			font-family: 'Arial Rounded MT Bold', sans-serif;
			font-size:  20px;
			user-select: none;
			-webkit-user-select: none;
		}
		div img {
			-webkit-user-drag: none; /* Untuk Safari/Chrome */
			user-drag: none;
		}
		.potensi {
			text-align: center;
			display: flex;
			justify-content: center;
			align-items: center;

			height: 43px;
			position: absolute;
			font-family: 'Arial Rounded MT Bold', sans-serif;
			font-weight: bold;
			font-size:  12px;
			user-select: none;
			-webkit-user-select: none;
		}
	</style>
</head>
<body>
	<div class ="bg" id="bg">
		<div class="areaDrag" id="areaDrag"></div>

		<img class="areaIn" id="areaIn"></img>

		<img class="insert" id="insert"></img>
		<img class="bubble" src="img/bubble.png" id="bubble"></img>
		<div class="namabenda" id="dragtext"></div>
		<div class="potensi" id="potensi"></div>
		<img class="dragatas" id="atas"></img>
		<div class="klikbtn2" id="kembali" style="width: 101px; height: 41px;">
			<img src="img/kembali.png" id="btnkembali"></img>
		</div>
	</div>
	<script>
		function RandomAngkaAtoB(a,b){ 
			var r = a+Math.ceil(Math.random() * b);
			return r;
		}
		function RandomMyArray(Arr){
			for (var i=0; i<Arr.length; i++){
				var r = Math.floor(Math.random() * Arr.length);
				var a = Arr[i];
				Arr[i] = Arr[r];
				Arr[r] = a;
			}
			return Arr
		}
	</script>
	<script>
		const myBG = document.getElementById("bg");
		myBG.x = myBG.getBoundingClientRect().x;
		myBG.y = myBG.getBoundingClientRect().y;
		myBG.style.backgroundImage = "url(img/2anorganik.png)";
		var xybtn = [[65,147+0*90],[65,147+1*90],[65,147+2*90]];
		var xyinsert = [[297,205],[297,205+20],[297,205+2*20],[297,205+3*20]];
		var arrData = [ 
						["Botol plastik","img/Bbig1.png","img/Bsmall1.png" ,1, [["img/Bhasil11.png","Nama produk: Tempat pensil<br>Bahan: Botol plastik"],["img/Bhasil12.png","Nama produk: Pot tanaman<br>Bahan: Botol plastik"]],false],
						["Bungkus kopi","img/Bbig2.png","img/Bsmall2.png"  ,2, [["img/Bhasil21.png","Nama produk: Tas<br>Bahan: Bungkus kopi"],["img/Bhasil22.png","Nama produk: Dompet<br>Bahan: Bungkus kopi"]],false],
						["Kaleng makanan","img/Bbig3.png","img/Bsmall3.png",3, [["img/Bhasil31.png","Nama produk: Celengan<br>Bahan: Kaleng"],["img/Bhasil32.png","Nama produk: Tempat lilin<br>Bahan: Kaleng"]],false]
					  ];
					  
		arrData = RandomMyArray(arrData);
		for(var i=1;i<=3;i++){
			document.getElementById('tombol'+i).src = arrData[i-1][1];
			document.getElementById('tombol'+i).name = arrData[i-1][0];

			document.getElementById('tombol'+i).style.left = ''+(myBG.x+xybtn[i-1][0])+'px';
			document.getElementById('tombol'+i).style.top = ''+(myBG.y+xybtn[i-1][1])+'px';
			document.getElementById('tombol'+i).x0 = document.getElementById('tombol'+i).style.left;
			document.getElementById('tombol'+i).y0 = document.getElementById('tombol'+i).style.top;
			document.getElementById('tombol'+i).style.top = ''+(myBG.y+xybtn[i-1][1])+'px';
			//salah
			document.getElementById('tombol'+i).i = i;
			document.getElementById('tombol'+i).sudah = false;
			
			arrData[i-1][4] = RandomMyArray(arrData[i-1][4]);
			
		}
		
		document.getElementById('insert').style.left = ''+(myBG.x+265)+'px';
		document.getElementById('insert').style.top = ''+(myBG.y+199)+'px';
		document.getElementById('insert').style.display = "none";//
		
		
		document.getElementById('kembali').style.left = ''+(myBG.x+715)+'px';
		document.getElementById('kembali').style.top = ''+(myBG.y+420)+'px';
		document.getElementById('areaDrag').style.left = ''+(myBG.x+15)+'px';
		document.getElementById('areaDrag').style.top = ''+(myBG.y+119)+'px';
		document.getElementById('areaDrop').style.left = ''+(myBG.x+251)+'px';
		document.getElementById('areaDrop').style.top = ''+(myBG.y+149)+'px';
		document.getElementById('dragtext').style.left = ''+(myBG.x+413)+'px';
		document.getElementById('dragtext').style.top = ''+(myBG.y+366)+'px';
		
		document.getElementById('kembali').style.display = "none";//
		document.getElementById('bubble').style.display = "none";//
		document.getElementById('areaDrop').style.opacity = '0';
		document.getElementById('areaImage').style.opacity = '0';
		document.getElementById('areaIn').style.opacity = '0';
		document.getElementById('areaIn').style.left = ''+(myBG.x+297)+'px';
		document.getElementById('areaIn').style.top = ''+(myBG.y+205)+'px';
		document.getElementById('areaImage').style.left = ''+(myBG.x+442)+'px';
		document.getElementById('areaImage').style.top = ''+(myBG.y+119)+'px';
		document.getElementById('bubble').style.left = ''+(myBG.x+353)+'px';
		document.getElementById('bubble').style.top = ''+(myBG.y+366)+'px';
		document.getElementById('potensi').style.left = ''+(myBG.x+441)+'px';
		document.getElementById('potensi').style.top = ''+(myBG.y+292)+'px';
		document.getElementById('potensi').innerHTML = "";
		document.getElementById('potensi').style.display = "none";//
		
		
		
		window.addEventListener('resize', () => {
			UbahWindow(0,0)
		});
		
		window.addEventListener('scroll', () => {
			const cX = window.scrollX || window.pageXOffset;
			const cY = window.scrollY || window.pageYOffset;
			UbahWindow(cX,cY)
		});
		
	</script>
	<script>
		var ct = 0;
		for (var i=1;i<=3;i++){
			document.getElementById('tombol'+i).addEventListener('mousedown', startDrag);
			document.getElementById('tombol'+i).addEventListener('touchstart', startDrag, { passive: false });

			document.getElementById('tombol'+i).xAwal = document.getElementById('tombol'+i).getBoundingClientRect().left;
			document.getElementById('tombol'+i).yAwal = document.getElementById('tombol'+i).getBoundingClientRect().top;
		}

		
		var item = document.querySelector('.klikbtn');
		const itemAtas = document.getElementById('atas');
		itemAtas.style.visibility = "hidden";
		function startDrag(e) {
			// Prevent mobile screen scrolling while dragging
			const targetElement = e.currentTarget || e.srcElement;
			item = targetElement;
			if (e.type === 'touchstart') {
				e.preventDefault(); 
				const touch = e.targetTouches[0];
				offsetX = touch.clientX/fixscale - item.getBoundingClientRect().left;
				offsetY = touch.clientY/fixscale - item.getBoundingClientRect().top;
			} else {
				offsetX = e.clientX/fixscale - item.getBoundingClientRect().left;
				offsetY = e.clientY/fixscale - item.getBoundingClientRect().top;
			}
			item.style.cursor = 'grabbing';
			item.dataset.dragging = 'true';
			
			itemAtas.src = item.src;
			itemAtas.style.visibility = "hidden";
			itemAtas.style.cursor = 'grabbing';
			itemAtas.dataset.dragging = 'true';
			document.getElementById('dragtext').innerHTML = item.name;
			document.getElementById('bubble').style.display = "";//none
		}
		
		//const item = document.querySelector('.draggable');

		let offsetX = 0;
		let offsetY = 0;

		// -- MOUSE EVENTS (Desktop) --
		//item.addEventListener('mousedown', startDrag);
		document.addEventListener('mousemove', moveDrag);
		document.addEventListener('mouseup', stopDrag);

		// -- TOUCH EVENTS (Mobile/Tablet) --
		//item.addEventListener('touchstart', startDrag, { passive: false });
		document.addEventListener('touchmove', moveDrag, { passive: false });
		document.addEventListener('touchend', stopDrag);


		function moveDrag(e) {
			if (item.dataset.dragging !== 'true') return;
			e.preventDefault();

			let currentX, currentY;

			if (e.type === 'touchmove') {
				const touch = e.targetTouches[0];
				currentX = touch.clientX;
				currentY = touch.clientY;
			} else {
				currentX = e.clientX;
				currentY = e.clientY;
				
			}
			document.getElementById('dragtext').innerHTML = item.name;
			
			// Update element position
			var dX = (currentX/fixscale - offsetX);
			var dY = (currentY/fixscale - offsetY);
			dX = Math.max(myBG.x,dX);
			dY = Math.max(myBG.y,dY);
			dX = Math.min(dX,myBG.x+840-item.width);
			dY = Math.min(dY,myBG.y+472-item.height);
			item.style.position = 'fixed';
			item.style.left = `${dX}px`;
			item.style.top = `${dY}px`;
			itemAtas.style.left = `${dX}px`;
			itemAtas.style.top = `${dY}px`;
			itemAtas.style.visibility = "visible";
			document.getElementById('bubble').style.display = "";//none

		}

		function stopDrag(e) {
			if (item.dataset.dragging !== 'true') return;
			item.dataset.dragging = 'false';

			let releaseX, releaseY;

			if (e.type === 'touchend') {
				// touchend changedTouches contains the touch point that was lifted
				const touch = e.changedTouches[0];
				releaseX = touch.clientX/fixscale;
				releaseY = touch.clientY/fixscale;
			} else {
				releaseX = e.clientX/fixscale;
				releaseY = e.clientY/fixscale;
			}
			
			// Hide the item briefly to see what is underneath it
			item.style.display = 'none';
			item.style.display = 'block';
			item.sudah = true;
			document.getElementById('bubble').style.display = "none";//
			
			var x0 = document.getElementById('areaDrop').getBoundingClientRect().x;
			var ww = document.getElementById('areaDrop').offsetWidth;
			var x1 = x0+ww;
			var y0 = document.getElementById('areaDrop').getBoundingClientRect().y;
			var hh = document.getElementById('areaDrop').offsetHeight;
			var y1 = y0+hh;
			var dT;
			var ff1 = releaseX>x0 && releaseX<x1;
			var ff2 = releaseY>y0 && releaseY<y1;
			var fff = ff1 && ff2;
			if(fff){
				dT = document.getElementById('areaDrop');
			}
			document.getElementById('dragtext').innerHTML = "";
			document.getElementById('bubble').style.display = "none";//
			
			// Check if target is your valid drop container
			if (dT) {
				//dropTarget.appendChild(item);
				ct++;
				document.getElementById('insert').src = arrData[item.i-1][1];
				document.getElementById('insert').style.display = "";
				
				document.getElementById('areaImage').src = arrData[item.i-1][4][0][0];
				document.getElementById('areaImage').style.opacity = '1';
				
				document.getElementById('potensi').innerHTML = arrData[item.i-1][4][0][1];
				document.getElementById('potensi').style.display = "";//none
				
				//item.style.transform = `scale(${0.39}, ${0.394})`;	
				//document.getElementById('areaIn').appendChild(item);
				item.style.display = "none";//
				item.style.position = 'left';
				item.style.left = ''+item.xAwal+'px';
				item.style.top = ''+item.yAwal+'px';
				item.style.float = "left";
				
				DaftarIsiImg();
			}else{
				item.style.left = ''+item.xAwal+'px';
				item.style.top = ''+item.yAwal+'px';
				item.style.position = 'left';
			}
			itemAtas.style.visibility = "hidden";
		}
		function DaftarIsiImg(){
			var ctcoba = 0;
			for(var i=1;i<=3;i++){
				if(document.getElementById('tombol'+i).sudah){
					ctcoba++;
				}
			}
			localStorage.setItem("Ccoba1", ctcoba);
			
			
			if(ctcoba==3){
				DataSini[1] = 1;
				console.log("DataSini = "+DataSini);
				
				localStorage.setItem("arCData", DataSini);
				document.getElementById('dragtext').innerHTML = "Good Job! \u{1F44D}";
				document.getElementById('bubble').style.display = "";//none
				document.getElementById('kembali').style.left = ''+(myBG.x+715)+'px';
				
				document.getElementById("kembali").style.display = "";
				document.getElementById("kembali").addEventListener("click", function() {
					location.href = "Pembukaan.html";
				});
			}
			
			if(document.getElementById('insert').mate){
				document.getElementById('insert').mate.style.left = ''+document.getElementById('insert').mate.xAwal+'px';
				document.getElementById('insert').mate.style.top = ''+document.getElementById('insert').mate.yAwal+'px';
				document.getElementById('insert').mate.style.display = "";//none
			}
			
			document.getElementById('insert').mate = item;
			
		}
	</script>
	<script>
		let DataSaya = localStorage.getItem("arCData");
		let DataSini = DataSaya.split(",");
		let Ccoba1 = localStorage.getItem("Ccoba1");
	</script>
	<script>
		var fixscale = 1;
		var fixzoom
		document.body.style.backgroundColor = "black";
		window.addEventListener('resize', () => {
			ZoomAll();
		});

		function UbahWindow(xc,yc){
			myBG.x = myBG.getBoundingClientRect().x;
			myBG.y = myBG.getBoundingClientRect().y;
			for(var i=1;i<=3;i++){
				document.getElementById('tombol'+i).style.left = ''+(myBG.x+xybtn[i-1][0])+'px';
				document.getElementById('tombol'+i).style.top = ''+(myBG.y+xybtn[i-1][1])+'px';
				
			}
			document.getElementById('insert').style.left = ''+(myBG.x+265)+'px';
			document.getElementById('insert').style.top = ''+(myBG.y+199)+'px';
			document.getElementById('kembali').style.left = ''+(myBG.x+715)+'px';
			document.getElementById('kembali').style.top = ''+(myBG.y+420)+'px';
			document.getElementById('areaDrag').style.left = ''+(myBG.x+15)+'px';
			document.getElementById('areaDrag').style.top = ''+(myBG.y+119)+'px';
			document.getElementById('areaDrop').style.left = ''+(myBG.x+251)+'px';
			document.getElementById('areaDrop').style.top = ''+(myBG.y+149)+'px';
			document.getElementById('dragtext').style.left = ''+(myBG.x+413)+'px';
			document.getElementById('dragtext').style.top = ''+(myBG.y+366)+'px';
			document.getElementById('areaIn').style.left = ''+(myBG.x+297)+'px';
			document.getElementById('areaIn').style.top = ''+(myBG.y+205)+'px';
			document.getElementById('areaImage').style.left = ''+(myBG.x+442)+'px';
			document.getElementById('areaImage').style.top = ''+(myBG.y+119)+'px';
			document.getElementById('bubble').style.left = ''+(myBG.x+353)+'px';
			document.getElementById('bubble').style.top = ''+(myBG.y+366)+'px';
			document.getElementById('potensi').style.left = ''+(myBG.x+441)+'px';
			document.getElementById('potensi').style.top = ''+(myBG.y+292)+'px';
			
			for (var i=1;i<=3;i++){
				document.getElementById('tombol'+i).xAwal = document.getElementById('tombol'+i).getBoundingClientRect().left;
				document.getElementById('tombol'+i).yAwal = document.getElementById('tombol'+i).getBoundingClientRect().top;
			}
		}
		function ZoomAll(){
			let lebarJendela = window.innerWidth;
			let tinggiJendela = window.innerHeight;
			var xscale = lebarJendela/840;
			var yscale = tinggiJendela/472;
			var scl = 0.95*Math.min(xscale,yscale);
			fixscale = scl;
			fixzoom = scl*100;
			document.body.style.zoom = ""+fixzoom+"%";
			UbahWindow(0,0);
		}
		
		ZoomAll();
		function handleClick(event) {
			console.log("handleClick");
		}
		myBG.addEventListener('click', handleClick);
		setTimeout(() => {
			console.log("handleClick")
			ZoomAll();
			myBG.removeEventListener('click', handleClick);
		}, 100);
		
		// Membaca ukuran pertama kali saat halaman dibuka
		//window.dispatchEvent(new Event("resize"));	
	</script>
	
	
</body>
