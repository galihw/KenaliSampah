<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenali Sampah di Sekitar Kita</title>
	<link rel="apple-touch-icon" sizes="180x180" href="../terakhir/favicon_io/apple-touch-icon.png">
	<link rel="icon" type="image/png" sizes="32x32" href="../terakhir/favicon_io/favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="16x16" href="../terakhir/favicon_io/favicon-16x16.png">
	<style>
		.bg {
			max-width: 840px; /* Lebar maksimal halaman */
			margin: 0 auto;
			width: 100%;
			height: 472px;
			position: absolute;
			user-select: none;
			-webkit-user-select: none;
		}
		.klikbtn {
			position: absolute;
			cursor: pointer;
			touch-action: none;
			width: 101px; 
			height: 41px; 
			background-color: #ff0000;
			user-select: none;
			-webkit-user-select: none;
		}
		.insert {
			position: absolute;
			touch-action: none;
			width: 385px; 
			height: 218px; 
			background-color: #220022;
			user-select: none;
			-webkit-user-select: none;
		}
		.teksnama {
			text-align: center;
			display: flex;
			justify-content: center;
			align-items: center;
			/*background-color: lightblue;*/
			width: 156px; 
			height: 76px;
			position: absolute;
			font-family: 'Arial Rounded MT Bold', sans-serif;
			font-size:  20px;
			user-select: none;
			-webkit-user-select: none;
		}
		.tekspenyusun {
			text-align: center;
			display: flex;
			justify-content: center;
			align-items: center;
			/*background-color: lightblue;*/
			width: 156px; 
			height: 120px;
			position: absolute;
			font-family: 'Arial Rounded MT Bold', sans-serif;
			font-size:  20px;
			user-select: none;
			-webkit-user-select: none;
		}
		img {
			position: absolute;
			-webkit-user-drag: none; /* Safari */
			user-drag: none;
			-webkit-user-select: none; /* Safari */
			-moz-user-select: none; /* Firefox */
			-ms-user-select: none; /* Internet Explorer/Edge */
			user-select: none;
		}
	</style>
</head>
<body>
	<div class ="bg" id="bg">
		<div class="teksnama" id="teksnama"></div>
		<div class="tekspenyusun" id="tekspenyusun"></div>
		<img src="img/kembali.png" id="kembali"></img>
		<div id="btnPrev" class="klikbtn"></div>
		<div id="btnNext" class="klikbtn"></div>
		<div id="btnKembali" class="klikbtn"></div>
		<img class="insert" id="insert"></img>
	</div>
	<script>
		const myBG = document.getElementById("bg");
		let lebarJendela = window.innerWidth;
		let tinggiJendela = window.innerHeight;
		var scl = 1;
		myBG.x = window.scrollX+(lebarJendela-840*scl)/2;
		myBG.y = window.scrollY+(tinggiJendela-472*scl)/2;
		myBG.style.left = ''+(myBG.x)+'px';
		myBG.style.top = ''+(myBG.y)+'px';
		myBG.style.backgroundImage = "url(img/3lainnya.png)";
		document.getElementById("btnPrev").style.left = ''+(471)+'px';
		document.getElementById("btnPrev").style.top = ''+(387)+'px';
		document.getElementById("btnNext").style.left = ''+(574)+'px';
		document.getElementById("btnNext").style.top = ''+(387)+'px';
		document.getElementById("btnKembali").style.left = ''+(685)+'px';
		document.getElementById("btnKembali").style.top = ''+(387)+'px';
		document.getElementById("kembali").style.left = ''+(685)+'px';
		document.getElementById("kembali").style.top = ''+(387)+'px';
		document.getElementById("insert").style.left = ''+(380)+'px';
		document.getElementById("insert").style.top = ''+(128)+'px';
		document.getElementById("teksnama").style.left = ''+(211)+'px';
		document.getElementById("teksnama").style.top = ''+(170)+'px';
		document.getElementById("tekspenyusun").style.left = ''+(211)+'px';
		document.getElementById("tekspenyusun").style.top = ''+(288)+'px';
		
		document.getElementById("btnKembali").style.display = "none";
		document.getElementById("kembali").style.display = "none";
		document.getElementById("btnPrev").style.opacity = '0';
		document.getElementById("btnNext").style.opacity = '0';
		document.getElementById("btnKembali").style.opacity = '0';
		
		document.body.style.backgroundColor = "black";
		
		var arrData = [
						["Meja dan kursi ecobrick","Botol plastik<br>Bungkus plastik"],
						["Tas","Kertas"],
						["Pajangan","Kertas"],
						["Vas bunga","Botol kaca"],
						["Sapu","Botol plastik"],
						["Tatakan","Kain perca"],
						["Lukisan","Tutup botol plastik"]
						]
		document.getElementById("btnPrev").addEventListener("click", function() {
			Prev();
		});
		document.getElementById("btnNext").addEventListener("click", function() {
			Next();
		});
		document.getElementById("btnKembali").addEventListener("click", function() {
			location.href = "Pembukaan.html";
		});
		
		var ct = 1;
		var sudah = [0,0,0,0,0,0,0];
		getImage();
		function Prev(){
			ct++;
			if(ct==8)	ct=1;
			getImage();
		}
		function Next(){
			ct--;
			if(ct==0)	ct=7;
			getImage();
		}
		function getImage(){
			sudah[ct-1]=1;
			var ctcoba = 0
			for(i=0;i<7;i++) if(sudah[i]==1) ctcoba;
			var ff = true;
			for(i=0;i<7;i++) ff = ff&&sudah[i]==1
			localStorage.setItem("Ccoba2", ctcoba);
			
			document.getElementById("teksnama").innerHTML = arrData[ct-1][0];
			document.getElementById("tekspenyusun").innerHTML = arrData[ct-1][1];
			
			document.getElementById("insert").src = "img/Cbig"+ct+".png";
			if(ff){
				document.getElementById("btnKembali").style.display = "";//none
				document.getElementById("kembali").style.display = "";//none
				DataSini[2]=1;
				localStorage.setItem("Ccoba2", ctcoba);
				localStorage.setItem("arCData", DataSini);
			}	
		}
	</script>
	
	
	<script>
		let DataSaya = localStorage.getItem("arCData");
		let DataSini = DataSaya.split(",");
		let Ccoba2 = localStorage.getItem("Ccoba2");
	</script>
	<script>
		function UbahWindow(xc,yc){
			lebarJendela = window.innerWidth;
			tinggiJendela = window.innerHeight;
			myBG.x = window.scrollX+(lebarJendela-840*scl)/2;
			myBG.y = window.scrollY+(tinggiJendela-472*scl)/2;
			myBG.style.left = ''+(myBG.x)+'px';
			myBG.style.top = ''+(myBG.y)+'px';
			document.getElementById("btnPrev").style.left = ''+(471)+'px';
			document.getElementById("btnPrev").style.top = ''+(387)+'px';
			document.getElementById("btnNext").style.left = ''+(574)+'px';
			document.getElementById("btnNext").style.top = ''+(387)+'px';
			document.getElementById("btnKembali").style.left = ''+(685)+'px';
			document.getElementById("btnKembali").style.top = ''+(387)+'px';
			document.getElementById("kembali").style.left = ''+(685)+'px';
			document.getElementById("kembali").style.top = ''+(387)+'px';
			document.getElementById("insert").style.left = ''+(380)+'px';
			document.getElementById("insert").style.top = ''+(128)+'px';
			document.getElementById("teksnama").style.left = ''+(211)+'px';
			document.getElementById("teksnama").style.top = ''+(170)+'px';
			document.getElementById("tekspenyusun").style.left = ''+(211)+'px';
			document.getElementById("tekspenyusun").style.top = ''+(288)+'px';
			
		}
		function ZoomAll(){
			let lebarJendela = window.innerWidth;
			let tinggiJendela = window.innerHeight;
			var xscale = lebarJendela/840;
			var yscale = tinggiJendela/472;
			scl = 0.95*Math.min(xscale,yscale);
			fixzoom = scl*100;
			document.body.style.zoom = ""+fixzoom+"%";
			//myBG.style.clipPath = "polygon(0 0, "+fixzoom+"% 0, "+fixzoom+"% "+fixzoom+"%, 0 "+fixzoom+"%)";
			UbahWindow(0,0);
		}
		
		ZoomAll();
		//window.resizeTo(840, 472);
		
		function handleClick(event) {
			console.log("handleClick");
		}
		myBG.addEventListener('click', handleClick);
		setTimeout(() => {
			console.log("handleClick")
			ZoomAll();
			myBG.removeEventListener('click', handleClick);
		}, 50);
	</script>
	<script>
		window.addEventListener('resize', () => {
			ZoomAll();
		});
	</script>
</body>
</html>
