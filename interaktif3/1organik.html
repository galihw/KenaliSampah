<body>

	<script>
		function RandomAngkaAtoB(a,b){ 
			var r = a+Math.ceil(Math.random() * b);
			return r;
		}
		function RandomMyArray(Arr){
			for (var i=0; i<Arr.length; i++){
				var r = Math.floor(Math.random() * Arr.length);
				var a = Arr[i];
				Arr[i] = Arr[r];
				Arr[r] = a;
			}
			return Arr
		}
	</script>
	<script>
		const cX = window.scrollX;
		const cY = window.scrollY;
		const myBG = document.getElementById("bg");
		myBG.style.backgroundImage = "url(img/2anorganik.png)";
		let lebarJendela = window.innerWidth;
		let tinggiJendela = window.innerHeight;
		var scl = 1;
		myBG.x = window.scrollX+(lebarJendela-840*scl)/2;
		myBG.y = window.scrollY+(tinggiJendela-472*scl)/2;
		myBG.style.left = ''+(myBG.x)+'px';
		myBG.style.top = ''+(myBG.y)+'px';
		var xybtn = [[65,147+0*70],[65,147+1*70],[65,147+2*70],[65,147+3*70]];
		var xybawah = [[296,204.5],[296,204.5+20],[296,204.5+20*2],[296,204.5+20*3]]; // 265.5+30.5=296 // 199.5+5=204.5
		var xydrop = [251,149];
		var xyhasil = [441,119];
		var xypotensi = [441,292];
		var xybubble = [353,366];
		var xyisibubble = [353+62,366];
		var xykembali = [715,420];
		var arrData = [["Kulit semangka","img/Abig1.png","img/Asmall1.png",1],
						["Sisa sayuran","img/Abig2.png","img/Asmall2.png",2],
						["Daun","img/Abig3.png","img/Asmall3.png",3],
						["Kertas","img/Abig4.png","img/Asmall4.png",4]
					  ];
		arrData = RandomMyArray(arrData);
		for(var i=1;i<=4;i++){
			document.getElementById('tombol'+i).style.left = ''+xybtn[i-1][0]+'px';
			document.getElementById('tombol'+i).style.top = ''+xybtn[i-1][1]+'px';
			document.getElementById('tombol'+i).src = arrData[i-1][1];
			document.getElementById('tombol'+i).srckecil = arrData[i-1][2];
			document.getElementById('tombol'+i).x0 = ''+xybtn[i-1][0]+'px';
			document.getElementById('tombol'+i).y0 = ''+xybtn[i-1][1]+'px';
			document.getElementById('tombol'+i).ct = 0;
			document.getElementById('tombol'+i).nama = arrData[i-1][0];
			document.getElementById('tombol'+i).sudah = false;
			document.getElementById('bawah'+i).style.left = ''+xybawah[i-1][0]+'px';
			document.getElementById('bawah'+i).style.top = ''+xybawah[i-1][1]+'px';
			document.getElementById('bawah'+i).style.display = "none";////hilangkan dulu
		}
		document.getElementById('atas').style.left = ''+0+'px';
		document.getElementById('atas').style.top = ''+0+'px';
		document.getElementById('atas').x0 = ''+0+'px';
		document.getElementById('atas').y0 = ''+0+'px';
		document.getElementById('drop').style.left = ''+xydrop[0]+'px';
		document.getElementById('drop').style.top = ''+xydrop[1]+'px';
		document.getElementById('hasil').style.left = ''+xyhasil[0]+'px';
		document.getElementById('hasil').style.top = ''+xyhasil[1]+'px';
		document.getElementById('potensi').style.left = ''+xypotensi[0]+'px';
		document.getElementById('potensi').style.top = ''+xypotensi[1]+'px';
		document.getElementById('potensi').innerHTML = "";
		document.getElementById('bubble').style.left = ''+(xybubble[0])+'px';
		document.getElementById('bubble').style.top = ''+(xybubble[1])+'px';
		document.getElementById('isibubble').style.left = ''+(xyisibubble[0])+'px';
		document.getElementById('isibubble').style.top = ''+(xyisibubble[1])+'px';
		document.getElementById('btnkembali').style.left = ''+(xykembali[0])+'px';
		document.getElementById('btnkembali').style.top = ''+(xykembali[1])+'px';
		document.getElementById('atas').style.display = "none";////hilangkan dulu
		document.getElementById('potensi').style.display = "none";////hilangkan dulu
		document.getElementById('bubble').style.display = "none";////hilangkan dulu
		document.getElementById('isibubble').style.display = "none";////hilangkan dulu

	</script>
	<script>
		for (var i=1;i<=4;i++){
			document.getElementById('tombol'+i).addEventListener('mousedown', startDrag);
			document.getElementById('tombol'+i).addEventListener('touchstart', startDrag, { passive: false });
		}
		
		// -- MOUSE EVENTS (Desktop) --
		//item.addEventListener('mousedown', startDrag);
		document.addEventListener('mousemove', moveDrag);
		document.addEventListener('mouseup', stopDrag);

		// -- TOUCH EVENTS (Mobile/Tablet) --
		//item.addEventListener('touchstart', startDrag, { passive: false });
		document.addEventListener('touchmove', moveDrag, { passive: false });
		document.addEventListener('touchend', stopDrag);
		
		var item = document.querySelector('.klikbtn');
		const itemAtas = document.getElementById('atas');
		//itemAtas.style.visibility = "hidden";
		//itemAtas.style.visibility = "visible";
		
		function startDrag(e) {
			// Prevent mobile screen scrolling while dragging
			const targetElement = e.target || e.srcElement;
			item = targetElement;
			if (e.type === 'touchstart') {
				e.preventDefault(); 
				const touch = e.targetTouches[0];
				offsetX = touch.clientX - item.getBoundingClientRect().left;
				offsetY = touch.clientY - item.getBoundingClientRect().top;
			} else {
				offsetX = e.clientX/fixscale - item.getBoundingClientRect().left;
				offsetY = e.clientY/fixscale - item.getBoundingClientRect().top;
			}
			item.style.cursor = 'grabbing';
			item.dataset.dragging = 'true';
			
			itemAtas.src = item.src;
			itemAtas.style.visibility = "visible";
			itemAtas.style.cursor = 'grabbing';
			itemAtas.dataset.dragging = 'true';
			document.getElementById('bubble').style.display = "";
			document.getElementById('isibubble').style.display = "";
			document.getElementById('isibubble').innerHTML = item.nama;
		}
		
		
		
		
		var dT=null;
		function moveDrag(e) {
			if (item.dataset.dragging !== 'true') return;
			e.preventDefault();
			let currentX, currentY;
			var dX,dY
			if (e.type === 'touchmove') {
				const touch = e.targetTouches[0];
				currentX = touch.clientX;
				currentY = touch.clientY;
				dX = (currentX - offsetX+myBG.x);
				dY = (currentY - offsetY+myBG.y);
			} else {
				currentX = e.clientX;
				currentY = e.clientY;
				dX = (currentX/fixscale - offsetX+myBG.x);
				dY = (currentY/fixscale - offsetY+myBG.y);
			}
			
			lebarJendela = window.innerWidth;
			tinggiJendela = window.innerHeight;
			myBG.x = window.scrollX+(lebarJendela-840*scl)/2;
			myBG.y = window.scrollY+(tinggiJendela-472*scl)/2;
			dX = Math.max(2*myBG.x,dX);
			dY = Math.max(2*myBG.y,dY);
			dX = Math.min(dX,2*myBG.x+myBG.offsetWidth-item.width);
			dY = Math.min(dY,2*myBG.y+myBG.offsetHeight-item.height);
			
			dT=null;
			//periksa
			var x0 = xydrop[0]-item.offsetWidth/2; // setengah ke kiri
			var ww = document.getElementById('drop').offsetWidth-item.offsetWidth/2;
			var x1 = x0+ww;
			var y0 = xydrop[1]-item.offsetHeight/2; // setengah ke atas
			var hh = document.getElementById('drop').offsetHeight-item.offsetHeight/2;
			var y1 = y0+hh;
			var ff1 = dX-2*myBG.x>x0 && dX-2*myBG.x<x1;
			var ff2 = dY-2*myBG.y>y0 && dY-2*myBG.y<y1;
			var fff = ff1 && ff2;
			if(fff){
				dT = item;
			}
			
			// Update element position
			item.style.left = `${dX-2*myBG.x}px`;
			item.style.top = `${dY-2*myBG.y}px`;
			if (e.type === 'touchmove') {
				itemAtas.style.left = `${dX-2*myBG.x}px`;
				itemAtas.style.top = `${dY-2*myBG.y}px`;
			}else{
				itemAtas.style.left = `${dX-2*myBG.x}px`;
				itemAtas.style.top = `${dY-2*myBG.y}px`;
			}
			itemAtas.style.visibility = "visible";
			itemAtas.style.display = "";
		}
		var arFIFO = []; // masuk dulu keluar dulu
		function stopDrag(e) {
			if (item.dataset.dragging !== 'true') return;
			item.dataset.dragging = 'false';
			
			if (dT) {
				//sudah masuk sini//
				item.sudah = true;
				arFIFO.push(item);
				item.style.display = "none"; //hilangkan kalau sudah
				document.getElementById('bawah'+(arFIFO.length)).style.display = "";
				document.getElementById('bawah'+arFIFO.length).src = arFIFO[arFIFO.length-1].srckecil;
			}else{
			}
			item.style.left = item.x0;
			item.style.top = item.y0;
			itemAtas.style.left = itemAtas.x0;
			itemAtas.style.top = itemAtas.y0;
			itemAtas.style.display = "none";
			document.getElementById('bubble').style.display = "none";
			document.getElementById('isibubble').style.display = "none";
			DaftarIsiImg()
		}
		function DaftarIsiImg(){
			var ctcoba = 0;
			for(var i=1;i<=4;i++){
				if(document.getElementById('tombol'+i).sudah){
					ctcoba++;
				}
			}
			localStorage.setItem("Ccoba1", ctcoba);
			
			
			if(ctcoba==4){
				DataSini[0] = 1;
				console.log("DataSini = "+DataSini);
				
				document.getElementById('hasil').src = "img/Ahasil.png";
				document.getElementById('potensi').innerHTML = "Nama produk: Kompos <br>Bahan: Kulit semangka, Sisa sayuran, Daun, dan Kertas"
				document.getElementById('potensi').style.display = "";
				
				localStorage.setItem("arCData", DataSini);
				document.getElementById('bubble').style.display = "";
				document.getElementById('isibubble').style.display = "";
				document.getElementById('btnkembali').style.display = "";
				document.getElementById('isibubble').innerHTML = "Good Job! \u{1F44D}";
				document.getElementById("btnkembali").addEventListener("click", function() {
					location.href = "Pembukaan.html";
				});
			}
		}
		
	</script>

	<script>
		let DataSaya = localStorage.getItem("arCData");
		let DataSini = DataSaya.split(",");

	<script>
		var fixscale = 1;
		var fixzoom
		document.body.style.backgroundColor = "black";
		window.addEventListener('resize', () => {
			ZoomAll();
		});

		function UbahWindow(xc,yc){
			lebarJendela = window.innerWidth;
			tinggiJendela = window.innerHeight;
			myBG.x = window.scrollX+(lebarJendela-840*scl)/2;
			myBG.y = window.scrollY+(tinggiJendela-472*scl)/2;
			myBG.style.left = ''+(myBG.x)+'px';
			myBG.style.top = ''+(myBG.y)+'px';
			for(var i=1;i<=4;i++){
				document.getElementById('tombol'+i).style.left = ''+xybtn[i-1][0]+'px';
				document.getElementById('tombol'+i).style.top = ''+xybtn[i-1][1]+'px';
				document.getElementById('tombol'+i).src = arrData[i-1][1];
				document.getElementById('tombol'+i).srckecil = arrData[i-1][2];
				document.getElementById('tombol'+i).x0 = ''+xybtn[i-1][0]+'px';
				document.getElementById('tombol'+i).y0 = ''+xybtn[i-1][1]+'px';\
			}
			document.getElementById('atas').style.left = ''+0+'px';
			document.getElementById('atas').style.top = ''+0+'px';
			document.getElementById('atas').x0 = ''+0+'px';
			document.getElementById('atas').y0 = ''+0+'px';
			document.getElementById('drop').style.left = ''+xydrop[0]+'px';
			document.getElementById('drop').style.top = ''+xydrop[1]+'px';
			document.getElementById('hasil').style.left = ''+xyhasil[0]+'px';
			document.getElementById('hasil').style.top = ''+xyhasil[1]+'px';
			document.getElementById('potensi').style.left = ''+xypotensi[0]+'px';
			document.getElementById('potensi').style.top = ''+xypotensi[1]+'px';\
			document.getElementById('bubble').style.left = ''+(xybubble[0])+'px';
			document.getElementById('bubble').style.top = ''+(xybubble[1])+'px';
			document.getElementById('isibubble').style.left = ''+(xyisibubble[0])+'px';
			document.getElementById('isibubble').style.top = ''+(xyisibubble[1])+'px';
			document.getElementById('btnkembali').style.left = ''+(xykembali[0])+'px';
			document.getElementById('btnkembali').style.top = ''+(xykembali[1])+'px';\
		}
		function ZoomAll(){
			let lebarJendela = window.innerWidth;
			let tinggiJendela = window.innerHeight;
			var xscale = lebarJendela/840;
			var yscale = tinggiJendela/472;
			scl = 0.95*Math.min(xscale,yscale);
			fixscale = scl;
			fixzoom = scl*100;
			document.body.style.zoom = ""+fixzoom+"%";
			UbahWindow(0,0);
		}
		
		ZoomAll();
		function handleClick(event) {
			console.log("handleClick");
		}
		myBG.addEventListener('click', handleClick);
		setTimeout(() => {
			console.log("handleClick")
			ZoomAll();
			myBG.removeEventListener('click', handleClick);
		}, 100);
		
		// Membaca ukuran pertama kali saat halaman dibuka
		//window.dispatchEvent(new Event("resize"));	
	</script>
