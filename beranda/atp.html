<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenali Sampah di Sekitar Kita</title>
	<link rel="apple-touch-icon" sizes="180x180" href="../terakhir/favicon_io/apple-touch-icon.png">
	<link rel="icon" type="image/png" sizes="32x32" href="../terakhir/favicon_io/favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="16x16" href="../terakhir/favicon_io/favicon-16x16.png">
	<style>
		.bg {
			max-width: 840px; /* Lebar maksimal halaman */
			margin: 0 auto;
			width: 100%;
			height: 472px;
		}
		
		.klikbtn {
			position: absolute;
			width: 100px; 
			height: 40px; 
			background-color: blue;
			opacity: 0.5;
			cursor: pointer;
			touch-action: none;
			user-select: none;
			-webkit-user-select: none;
		}
		.kotakHP {
			position: absolute;
			width: 40px; 
			height: 40px; 
			background-color: red;
			cursor: default;
			touch-action: none;
			user-select: none;
			-webkit-user-select: none;
		}
	</style>
</head>
<body>
	<div class ="bg" id="bg">
		<div class="klikbtn" id="tombol"></div>
		<div class="kotakHP" id="HP"></div>
	</div>
	<script>
		const myBtn = document.getElementById("tombol");
		const myBG = document.getElementById("bg");
		const myHP = document.getElementById("HP");
		myBG.style.backgroundImage = "url(img/atp.png)";
		myBG.x = myBG.getBoundingClientRect().x;
		myBG.y = myBG.getBoundingClientRect().y;
		var xybtn = [685,414];
		myBtn.style.left = ''+(myBG.x+xybtn[0])+'px';
		myBtn.style.top = ''+(myBG.y+xybtn[1])+'px';
		myBtn.addEventListener("click", function() {
			location.href = "beranda.html";
		});
		
		document.body.style.backgroundColor = "black";
		window.addEventListener('resize', () => {
			ZoomAll();
		});
		
		myHP.style.left = ''+(myBG.x)+'px';
		myHP.style.top = ''+(myBG.y)+'px';
		myHP.style.display = '';//none
		
		
	</script>
	
	
	<script>
		var scl = 1;
		//function isMobileUserAgent() {
		//	return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
		//}

		//if (isMobileUserAgent()) {
		//	console.log("Terdeteksi menggunakan HP via User Agent");
		//	myHP.style.display = '';
		//}
		function UbahWindow(xc,yc){
			myBG.x = myBG.getBoundingClientRect().x/window.devicePixelRatio;
			myBG.y = myBG.getBoundingClientRect().y/window.devicePixelRatio;
			myBtn.style.left = ''+(myBG.x+xybtn[0])+'px';
			myBtn.style.top = ''+(myBG.y+xybtn[1])+'px';
			myHP.style.left = ''+(myBG.x)+'px';
			myHP.style.top = ''+(myBG.y)+'px';
		}
		function ZoomAll(){
			let lebarJendela = window.innerWidth;
			let tinggiJendela = window.innerHeight;
			var xscale = lebarJendela/840;
			var yscale = tinggiJendela/472;
			scl = 0.95*Math.min(xscale,yscale);
			fixzoom = scl*100;
			document.body.style.zoom = ""+fixzoom+"%";
			UbahWindow(0,0);
		}
		
		ZoomAll();
		function handleClick(event) {
			console.log("handleClick");
		}
		myBG.addEventListener('click', handleClick);
		setTimeout(() => {
			console.log("handleClick")
			ZoomAll();
			myBG.removeEventListener('click', handleClick);
		}, 50);
	</script>
</body>
</html>
