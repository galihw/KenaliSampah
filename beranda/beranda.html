<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenali Sampah di Sekitar Kita</title>
	<link rel="apple-touch-icon" sizes="180x180" href="../terakhir/favicon_io/apple-touch-icon.png">
	<link rel="icon" type="image/png" sizes="32x32" href="../terakhir/favicon_io/favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="16x16" href="../terakhir/favicon_io/favicon-16x16.png">
	<style>
		.bg {
			max-width: 840px; /* Lebar maksimal halaman */
			margin: 0 auto;
			width: 100%;
			height: 472px;
			position: absolute;
		}
		.klikbtn {
			position: absolute;
			cursor: pointer;
			touch-action: none;
			width: 175px; 
			height: 62px; 
			background-color: blue;
			user-select: none;
			-webkit-user-select: none;
		}
	</style>
</head>
<body>
	<div class ="bg" id="bg">
		<div class="klikbtn" id="tombol1"></div>
		<div class="klikbtn" id="tombol2"></div>
		<div class="klikbtn" id="tombol3"></div>
		<div class="klikbtn" id="tombol4"></div>
	</div>
	<script>
	</script>
	<script>
		const myBG = document.getElementById("bg");
		myBG.style.backgroundImage = "url(img/beranda.png)";
		let lebarJendela = window.innerWidth;
		let tinggiJendela = window.innerHeight;
		var scl = 1;
		myBG.x = window.scrollX+(lebarJendela-840*scl)/2;
		myBG.y = window.scrollY+(tinggiJendela-472*scl)/2;
		myBG.style.left = ''+(myBG.x)+'px';
		myBG.style.top = ''+(myBG.y)+'px';
		
		
		var arbtn = [];
		var xybtn = [[20,146],[20,220],[426,165],[20,294]];
		var linkbtn = ["carapenggunaan.html","atp.html","../interaktif1/Pengantar.html","../terakhir/Pengembang.html"];
		for(var i=1;i<=4;i++){
			arbtn[i-1] = document.getElementById('tombol'+i);
			arbtn[i-1].style.left = ''+(xybtn[i-1][0])+'px';
			arbtn[i-1].style.top = ''+(xybtn[i-1][1])+'px';
			arbtn[i-1].style.zIndex = "auto";
			arbtn[i-1].link = linkbtn[i-1];
			//arbtn[i-1].style.opacity = "0";
			
			arbtn[i-1].link = linkbtn[i-1];
			arbtn[i-1].addEventListener("click", function(e) {
				location.href = e.target.link;
			});
		}
		
		document.body.style.backgroundColor = "black";
		window.addEventListener('resize', () => {
			ZoomAll();
		});
	</script>
	<script>
		function UbahWindow(xc,yc){
			myBG.x = window.scrollX+(lebarJendela-840*scl)/2;
			myBG.y = window.scrollY+(tinggiJendela-472*scl)/2;
			myBG.style.left = ''+(myBG.x)+'px';
			myBG.style.top = ''+(myBG.y)+'px';
			for(var i=1;i<=4;i++){
				arbtn[i-1].style.left = ''+(xybtn[i-1][0])+'px';
				arbtn[i-1].style.top = ''+(xybtn[i-1][1])+'px';
			}
		}
		function ZoomAll(){
			let lebarJendela = window.innerWidth;
			let tinggiJendela = window.innerHeight;
			var xscale = lebarJendela/840;
			var yscale = tinggiJendela/472;
			scl = 0.95*Math.min(xscale,yscale);
			fixzoom = scl*100;
			document.body.style.zoom = ""+fixzoom+"%";
			UbahWindow(0,0);
		}
		
		ZoomAll();
		function handleClick(event) {
			console.log("handleClick");
		}
		myBG.addEventListener('click', handleClick);
		setTimeout(() => {
			console.log("handleClick")
			ZoomAll();
			myBG.removeEventListener('click', handleClick);
		}, 50);
	</script>
</body>
</html>
